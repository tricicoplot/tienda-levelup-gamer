<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Producto | Admin Level-Up Gamer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-black text-white">

    <script>
        if (localStorage.getItem("admin-session") !== "true") { window.location.href = "login.html"; }
    </script>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>NUEVO PRODUCTO (Panel Admin)</h2>
            <a href="admin.html" class="btn btn-outline-light">Volver al Dashboard</a>
        </div>

        <div class="card bg-dark p-4 shadow border-secondary mx-auto" style="max-width: 600px;">
            <form id="productoForm" novalidate onsubmit="event.preventDefault(); alert('Producto registrado exitosamente en el inventario temporal.'); this.reset();">
                
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label text-warning fw-bold">Código</label>
                        <input type="text" class="form-control bg-black text-white border-secondary" id="prodCodigo" minlength="3" placeholder="Ej: AC003" required>
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">Nombre del Producto</label>
                        <input type="text" class="form-control bg-black text-white border-secondary" id="prodNombre" maxlength="100" required>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Categoría</label>
                        <select class="form-select bg-black text-white border-secondary" id="prodCategoria" required>
                            <option value="" selected disabled>Seleccione...</option>
                            <option value="Juegos de Mesa">Juegos de Mesa</option>
                            <option value="Accesorios">Accesorios</option>
                            <option value="Consolas">Consolas</option>
                            <option value="Computadores Gamers">Computadores Gamers</option>
                            <option value="Sillas Gamers">Sillas Gamers</option>
                            <option value="Mouse">Mouse</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Descripción (Opcional - Max 500 caract.)</label>
                        <textarea class="form-control bg-black text-white border-secondary" id="prodDescripcion" rows="3" maxlength="500"></textarea>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label text-success fw-bold">Precio (CLP)</label>
                        <input type="number" class="form-control bg-black text-white border-secondary" id="prodPrecio" min="0" step="0.1" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Stock</label>
                        <input type="number" class="form-control bg-black text-white border-secondary" id="prodStock" min="0" step="1" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label text-danger">Stock Crítico</label>
                        <input type="number" class="form-control bg-black text-white border-secondary" id="prodStockCritico" min="0" step="1" placeholder="Ej: 5">
                    </div>

                    <div class="col-12">
                        <label class="form-label">URL de Imagen (Opcional)</label>
                        <input type="url" class="form-control bg-black text-white border-secondary" id="prodImagen" placeholder="src/assets/productos/imagen.jpg">
                    </div>

                    <div class="col-12 mt-4 text-center">
                        <button type="submit" class="btn btn-primary px-5 py-2 fw-bold">CREAR PRODUCTO</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
