<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Producto | Admin Level-Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-black text-white">
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block bg-dark sidebar border-end border-secondary p-3">
                <div class="text-center mb-4 mt-3">
                    <span class="fs-4 fw-bold text-warning" style="font-family: var(--font-header);">ADMIN PANEL</span>
                </div>
                <ul class="nav flex-column gap-2">
                    <li class="nav-item"><a class="nav-link text-white" href="admin.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link text-warning fw-bold" href="nuevo-producto.html">🛒 Productos</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="nuevo-usuario.html">👥 Usuarios</a></li>
                    <li class="nav-item mt-4"><a class="nav-link text-danger" href="../../index.html">← Volver a Tienda</a></li>
                </ul>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-5">
                <h1 class="display-5 mb-4 fw-bold" style="font-family: var(--font-header);">EDITAR PRODUCTO</h1>
                
                <div class="card bg-dark text-white border-secondary shadow p-4">
                    <form id="formNuevoProducto">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label">Código del Producto *</label>
                                <input type="text" class="form-control bg-black text-white border-secondary" minlength="3" required>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label">Nombre *</label>
                                <input type="text" class="form-control bg-black text-white border-secondary" maxlength="100" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Descripción</label>
                                <textarea class="form-control bg-black text-white border-secondary" rows="3" maxlength="500"></textarea>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Precio ($) *</label>
                                <input type="number" class="form-control bg-black text-white border-secondary" min="0" step="0.01" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Stock *</label>
                                <input type="number" class="form-control bg-black text-white border-secondary" min="0" step="1" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Stock Crítico</label>
                                <input type="number" class="form-control bg-black text-white border-secondary" min="0" step="1">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Categoría *</label>
                                <select class="form-select bg-black text-white border-secondary" required>
                                    <option value="">-- Seleccionar --</option>
                                    <option value="Juegos de Mesa">Juegos de Mesa</option>
                                    <option value="Accesorios">Accesorios</option>
                                    <option value="Consolas">Consolas</option>
                                    <option value="Computadores Gamers">Computadores Gamers</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Imagen</label>
                                <input type="file" class="form-control bg-black text-white border-secondary" accept="image/*">
                            </div>
                        </div>
                        <div class="mt-4 text-end">
                            <button type="submit" class="btn btn-warning px-5 fw-bold">GUARDAR CAMBIOS</button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>
    
    <script src="../js/app.js"></script>
</body>
</html>
