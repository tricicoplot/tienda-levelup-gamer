<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin | Level-Up Gamer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../src/css/style.css">
</head>
<body class="bg-black text-white">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Panel Administrativo</h2>
            <a href="../index.html" class="btn btn-outline-light">Volver a la Tienda</a>
        </div>
        <div class="table-responsive">
            <table class="table table-dark table-striped table-hover">
                <thead>
                    <tr><th>ID</th><th>Producto</th><th>Categoría</th><th>Precio</th><th>Stock</th></tr>
                </thead>
                <tbody id="admin-productos-tbody"></tbody>
            </table>
        </div>
    </div>
    <script src="../src/js/auth.js"></script>
    <script>
        verificarAcceso('Administrador');
        fetch('../data.json')
            .then(r => r.json())
            .then(data => {
                const tbody = document.getElementById('admin-productos-tbody');
                tbody.innerHTML = data.map(p => `
                    <tr>
                        <td>${p.codigo}</td>
                        <td>${p.nombre}</td>
                        <td>${p.categoria}</td>
                        <td>$${p.precio.toLocaleString('es-CL')}</td>
                        <td>${p.stock}</td>
                    </tr>
                `).join("");
            });
    </script>
</body>
</html>
