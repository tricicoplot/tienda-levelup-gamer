<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin | Level-Up Gamer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../src/css/style.css">
</head>
<body class="bg-black text-white">
    <div class="container py-5">
        <h2>Panel Administrativo</h2>
        <a href="../index.html" class="btn btn-secondary mb-3">Volver a Tienda</a>
        <table class="table table-dark table-hover">
            <thead><tr><th>Código</th><th>Nombre</th><th>Stock</th></tr></thead>
            <tbody id="admin-productos-tbody"></tbody>
        </table>
    </div>
    <script src="../src/js/auth.js"></script>
    <script>
        verificarAcceso('Administrador');
        // Ruta corregida para subir un nivel y buscar el JSON en la raíz
        fetch('../data.json')
            .then(r => r.json())
            .then(data => {
                const tbody = document.getElementById('admin-productos-tbody');
                tbody.innerHTML = data.map(p => `
                    <tr>
                        <td>${p.codigo}</td>
                        <td>${p.nombre}</td>
                        <td>${p.stock}</td>
                    </tr>
                `).join("");
            })
            .catch(err => console.error("Error cargando datos Admin:", err));
    </script>
</body>
</html>
