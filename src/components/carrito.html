<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carrito | Level-Up Gamer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-black text-white">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow py-2">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="../../index.html">
                <span class="fs-3 fw-bold ms-2" style="font-family: var(--font-header);">LEVEL-UP GAMER</span>
            </a>
            <div class="d-flex align-items-center">
                <a href="../../index.html" class="btn btn-outline-light me-3">Seguir Comprando</a>
                <span class="fs-5">🛒 (<span id="cart-count" class="text-warning">0</span>)</span>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <h2 class="mb-4 fw-bold" style="font-family: var(--font-header);">Mi carrito de compras</h2>
        
        <div class="row g-4">
            <div class="col-lg-8">
                <div id="carrito-items" class="d-flex flex-column gap-3">
                    </div>
            </div>

            <div class="col-lg-4">
                <div class="card bg-dark text-white border-secondary p-4 sticky-top" style="top: 100px;">
                    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom border-secondary pb-3">
                        <h4 class="mb-0 fw-bold">TOTAL:</h4>
                        <h3 id="carrito-total" class="text-warning fw-bold mb-0">$0</h3>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label small text-muted">Ingrese el cupón de descuento</label>
                        <div class="input-group">
                            <input type="text" id="codigo-cupon" class="form-control bg-black text-white border-secondary" placeholder="Ej: DUOC20">
                            <button class="btn btn-outline-secondary text-white" type="button" onclick="aplicarCupon()">APLICAR</button>
                        </div>
                    </div>
                    
                    <button class="btn btn-success w-100 fw-bold py-3 fs-5" onclick="procesarPago()">
                        PAGAR AHORA
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center p-4 bg-dark mt-5 text-secondary border-top border-secondary">
        <p class="mb-0">&copy; 2026 Level-Up Gamer. Todos los derechos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/app.js"></script>
    
    <script>
        let cuponAplicado = false;

        // Lógica del descuento DUOC
        function aplicarCupon() {
            if (cuponAplicado) {
                alert("Ya has aplicado un cupón a esta compra.");
                return;
            }

            const inputCupon = document.getElementById('codigo-cupon').value.trim().toUpperCase();
            
            if (inputCupon === "DUOC20" || inputCupon === "DUOC") {
                const totalElemento = document.getElementById('carrito-total');
                let totalActual = parseInt(totalElemento.innerText.replace(/[^0-9]/g, ''));
                
                if (totalActual > 0) {
                    const descuento = totalActual * 0.20; // 20%
                    const nuevoTotal = totalActual - descuento;
                    
                    totalElemento.innerText = `$${nuevoTotal.toLocaleString('es-CL')} (20% OFF)`;
                    totalElemento.classList.replace("text-warning", "text-success");
                    
                    cuponAplicado = true;
                    alert("¡Beneficio Gamer Detectado! Tienes un 20% de descuento en tu total por ser de DUOC.");
                } else {
                    alert("Agrega productos al carrito antes de aplicar un cupón.");
                }
            } else {
                alert("Cupón no válido o expirado.");
            }
        }

        // Simulación de Pago
        function procesarPago() {
            const carrito = JSON.parse(localStorage.getItem('carrito-levelup')) || [];
            if (carrito.length === 0) {
                alert("Tu carrito está vacío. Agrega productos antes de pagar.");
                return;
            }
            
            alert("Procesando pago seguro...");
            localStorage.removeItem('carrito-levelup');
            alert("¡Pago exitoso! Gracias por tu compra en Level-Up Gamer.");
            window.location.href = "../../index.html";
        }
    </script>
</body>
</html>
