<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Usuario | Admin Level-Up Gamer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-black text-white">

    <script>
        if (localStorage.getItem("admin-session") !== "true") { window.location.href = "login.html"; }
    </script>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>NUEVO USUARIO (Panel Admin)</h2>
            <a href="admin.html" class="btn btn-outline-light">Volver al Dashboard</a>
        </div>

        <div class="card bg-dark p-4 shadow border-secondary mx-auto" style="max-width: 700px;">
            <form id="registroForm" novalidate>
                
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label text-warning">RUN</label>
                        <input type="text" class="form-control bg-black text-white border-secondary" id="regRun" placeholder="Ej: 19011022K">
                        <div class="invalid-feedback"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-warning">Tipo de Usuario</label>
                        <select class="form-select bg-black text-white border-secondary" id="regTipoUsuario" required>
                            <option value="Cliente" selected>Cliente</option>
                            <option value="Vendedor">Vendedor</option>
                            <option value="Administrador">Administrador</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Nombres</label>
                        <input type="text" class="form-control bg-black text-white border-secondary" id="regNombre">
                        <div class="invalid-feedback"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Apellidos</label>
                        <input type="text" class="form-control bg-black text-white border-secondary" id="regApellidos">
                        <div class="invalid-feedback"></div>
                    </div>

                    <div class="col-md-8">
                        <label class="form-label">Correo Institucional / Personal</label>
                        <input type="email" class="form-control bg-black text-white border-secondary" id="regEmail" placeholder="usuario@inacap.cl">
                        <div class="invalid-feedback"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Fecha Nacimiento (Opcional)</label>
                        <input type="date" class="form-control bg-black text-white border-secondary" id="regFechaNacimiento">
                        <div class="invalid-feedback"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Región</label>
                        <select class="form-select bg-black text-white border-secondary" id="select-region"></select>
                        <div class="invalid-feedback"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Comuna</label>
                        <select class="form-select bg-black text-white border-secondary" id="select-comuna" disabled></select>
                        <div class="invalid-feedback"></div>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Dirección Completa</label>
                        <input type="text" class="form-control bg-black text-white border-secondary" id="regDireccion">
                        <div class="invalid-feedback"></div>
                    </div>

                    <div class="col-12 mt-4 text-center">
                        <button type="submit" class="btn btn-success px-5 py-2 fw-bold">REGISTRAR USUARIO</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/formulario.js"></script>
</body>
</html>
